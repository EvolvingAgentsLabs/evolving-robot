odysseyVersion: "0.1"
kind: Mission

metadata:
  name: patrol-2d
  description: >
    A 2D patrol robot visits every checkpoint in the facility. A Gemma 4 SPECIALIST
    plans the route; a Gemma-driven pilot (native function-calling) executes it in the
    sim2d simulator. No GPU, no real hardware, no VLA weights.
  tags: [patrol, gemma, sim2d, evolving-robot]

objective: |
  Patrol the facility: visit the Server Room, Emergency Exit, Supply Closet, and Main
  Entrance, and report each checkpoint as clear.

acceptance_criteria: |
  The robot reaches every checkpoint (within arrive radius) in the evaluation episode.

robot:
  # Free-form embodiment label. The engine runs without a ProviderRegistry, so this is
  # never resolved against odyssey's embodiment catalog (see scripts/run_mission.py).
  embodiment: patrol_bot_2d
  agents:
    - id: pilot
      role: PILOT
      model:
        source: huggingface
        base: google/gemma-4-26b-a4b-it   # a label; the pilot calls Gemma over REST
    - id: route-planner
      role: SPECIALIST
      model:
        source: huggingface
        base: google/gemma-4-26b-a4b-it

tasks:
  # Formal warm-up. A 2D nav robot has no VLA to fine-tune, so training is a no-op
  # stub routed to odyssey's CPUMockRunner (config.runner). The substance is the eval.
  - name: warmup
    kind: training
    training_type: demonstration
    agent_id: pilot
    dataset:
      source: local
      ref: none
      format: parquet
    config:
      runner: cpu_mock

  - name: patrol-eval
    kind: evaluation
    evaluation_type: custom     # -> selects Sim2DRunner
    benchmark_name: patrol-2d
    num_episodes: 1
    config:
      max_steps: 30
      arrive_radius_m: 0.6
      # pilot: scripted        # uncomment to force the no-API geometry pilot

leaderboard:
  publish: false
graph:
  contribute: false
